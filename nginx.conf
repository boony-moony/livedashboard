server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PUBLIC — scrubbed, no container names
    location /status.json {
        alias /data/status-public.json;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }
    location /history.json {
        alias /data/history-public.json;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # PRIVATE — full data, gated by session token in API
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # DB download — admin only (token checked by API)
    location /download/history.db {
        alias /data/uptime.db;
        add_header Content-Disposition "attachment; filename=uptime.db";
    }
}
